<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warenkorb</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; padding: 1rem; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.25rem; }
.empty { text-align: center; color: #999; padding: 3rem 1rem; font-size: 15px; }
.cart-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; display: flex; gap: 12px; align-items: center; }
.cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; flex-shrink: 0; }
.item-info { flex: 1; }
.item-name { font-weight: 500; font-size: 15px; margin-bottom: 4px; }
.item-format { font-size: 13px; color: #666; margin-bottom: 4px; }
.item-price { font-size: 16px; font-weight: 500; color: #378ADD; }
.remove-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 20px; padding: 4px; flex-shrink: 0; }
.remove-btn:hover { color: #e53935; }
.divider { border: none; border-top: 1px solid #e0e0e0; margin: 1rem 0; }
.total-row { display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }
.total-price { font-size: 22px; font-weight: 600; color: #378ADD; }
.section-title { font-size: 14px; font-weight: 500; color: #555; margin-bottom: 0.75rem; }
.field { margin-bottom: 0.75rem; }
.field label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
.field input, .field textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; }
.field textarea { min-height: 70px; resize: vertical; }
.row2 { display: grid; grid-template-columns: 1fr 2fr; gap: 0.75rem; }
.btn { background: #378ADD; color: #fff; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 0.5rem; }
.btn:hover { background: #185FA5; }
.btn-clear { background: none; border: 1px solid #ddd; color: #999; border-radius: 8px; padding: 10px; font-size: 13px; cursor: pointer; width: 100%; margin-top: 0.5rem; }
.btn-clear:hover { border-color: #e53935; color: #e53935; }
.success { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; padding: 1rem; margin-top: 1rem; color: #2e7d32; display: none; font-size: 14px; text-align: center; }
</style>
</head>
<body>
<h1>🛒 Warenkorb</h1>
<div id="cartContainer"></div>
<div id="orderForm" style="display:none">
  <hr class="divider">
  <div class="total-row">
    <span>Gesamtbetrag</span>
    <span class="total-price" id="totalPrice">EUR 0</span>
  </div>
  <p class="section-title">Ihre Kontaktdaten</p>
  <div class="field"><label>Name *</label><input type="text" id="fname" placeholder="Vollständiger Name" /></div>
  <div class="row2">
    <div class="field"><label>PLZ *</label><input type="text" id="fplz" placeholder="PLZ" /></div>
    <div class="field"><label>Straße / Nr. *</label><input type="text" id="fstrasse" placeholder="Straße und Hausnummer" /></div>
  </div>
  <div class="field"><label>Stadt *</label><input type="text" id="fstadt" placeholder="Stadt" /></div>
  <div class="field"><label>E-Mail *</label><input type="email" id="femail" placeholder="E-Mail-Adresse" /></div>
  <div class="field"><label>Telefon</label><input type="tel" id="ftel" placeholder="+49" /></div>
  <div class="field"><label>Anmerkungen</label><textarea id="fnotes" placeholder="Weitere Wünsche oder Hinweise"></textarea></div>
  <button class="btn" onclick="submitOrder()">✉️ Verbindlich bestellen</button>
  <button class="btn-clear" onclick="clearCart()">Warenkorb leeren</button>
  <button class="btn-clear" style="margin-top:6px;" onclick="window.location.href='https://momokkbk.github.io/Jonathan-Gallery/kunstdrucke_v3%203.html'">← Weiter einkaufen</button>
  <hr style="border:none;border-top:1px solid #e0e0e0;margin:1rem 0;">
  <button class="btn-clear" style="margin-top:0;border-color:#e53935;color:#e53935;" onclick="window.location.href='https://momokkbk.github.io/Jonathan-Gallery/widerruf.html'">⚠️ Vertrag widerrufen</button>
  <button class="btn-clear" style="margin-top:6px;" onclick="window.location.href='https://momokkbk.github.io/Jonathan-Gallery/kunstdrucke_v3%203.html'">← Weiter einkaufen</button>
  <div class="success" id="successMsg">✓ Vielen Dank! Ihre Bestellung wurde per E-Mail an die Galerie gesendet.</div>
</div>

<script>
function loadCart() {
  return JSON.parse(localStorage.getItem('jg_cart') || '[]');
}

function saveCart(cart) {
  localStorage.setItem('jg_cart', JSON.stringify(cart));
}

function renderCart() {
  const cart = loadCart();
  const container = document.getElementById('cartContainer');
  const form = document.getElementById('orderForm');

  if (cart.length === 0) {
    container.innerHTML = '<div class="empty">🖼️<br><br>Ihr Warenkorb ist leer.<br>Wählen Sie Kunstdrucke auf der Seite "Kunstdrucke".</div>';
    form.style.display = 'none';
    return;
  }

  container.innerHTML = '';
  let total = 0;
  cart.forEach((item, i) => {
    const price = parseInt(item.preis.replace('EUR ', ''));
    total += price;
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <img src="${item.img}" alt="${item.name}" />
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-format">Format: ${item.format}</div>
        <div class="item-price">${item.preis}</div>
      </div>
      <button class="remove-btn" onclick="removeItem(${i})" title="Entfernen">×</button>
    `;
    container.appendChild(div);
  });

  document.getElementById('totalPrice').textContent = 'EUR ' + total;
  form.style.display = 'block';
}

function removeItem(index) {
  const cart = loadCart();
  cart.splice(index, 1);
  saveCart(cart);
  renderCart();
}

function clearCart() {
  if (confirm('Warenkorb wirklich leeren?')) {
    localStorage.removeItem('jg_cart');
    renderCart();
  }
}

function submitOrder() {
  const name = document.getElementById('fname').value.trim();
  const email = document.getElementById('femail').value.trim();
  const plz = document.getElementById('fplz').value.trim();
  const strasse = document.getElementById('fstrasse').value.trim();
  const stadt = document.getElementById('fstadt').value.trim();
  if (!name || !email || !plz || !strasse || !stadt) {
    alert('Bitte füllen Sie alle Pflichtfelder aus (Name, Adresse, E-Mail).'); return;
  }
  const cart = loadCart();
  let bestellungText = `Bestellung – Art Gallery Jonathan\n\n`;
  bestellungText += `=== BESTELLTE KUNSTDRUCKE ===\n`;
  let total = 0;
  cart.forEach(item => {
    const price = parseInt(item.preis.replace('EUR ', ''));
    total += price;
    bestellungText += `• ${item.name} | Format: ${item.format} | ${item.preis}\n`;
  });
  bestellungText += `\nGesamtbetrag: EUR ${total}\n`;
  bestellungText += `\n=== KUNDENDATEN ===\n`;
  bestellungText += `Name: ${name}\n`;
  bestellungText += `Adresse: ${strasse}, ${plz} ${stadt}\n`;
  bestellungText += `E-Mail: ${email}\n`;
  bestellungText += `Telefon: ${document.getElementById('ftel').value}\n`;
  bestellungText += `Anmerkungen: ${document.getElementById('fnotes').value}\n`;

  window.location.href = `mailto:Axel.emmrich@gmail.com?subject=Bestellung Art Gallery Jonathan&body=${encodeURIComponent(bestellungText)}`;
  document.getElementById('successMsg').style.display = 'block';
}

// Refresh cart when page becomes visible (user navigates back from Kunstdrucke)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) renderCart();
});

renderCart();
</script>
</body>
</html>
