<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Gallery Jonathan</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #111; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0; }
.header-title { font-size: 14px; font-weight: 500; color: #ccc; }
.header-counter { font-size: 13px; color: #888; }
.copyright-badge { font-size: 10px; color: #555; }

/* Hauptbild-Bereich */
.main-view { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.main-img-wrap { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.main-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; pointer-events: none; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; }
.main-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
.main-watermark { position: absolute; bottom: 12px; right: 12px; font-size: 12px; color: rgba(255,255,255,0.4); z-index: 3; pointer-events: none; user-select: none; }
.main-title { position: absolute; bottom: 12px; left: 12px; font-size: 13px; color: rgba(255,255,255,0.7); z-index: 3; pointer-events: none; background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: 4px; }

/* Pfeil-Navigation */
.nav-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 4; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 24px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.nav-btn:hover { background: rgba(55,138,221,0.7); }
.nav-prev { left: 10px; }
.nav-next { right: 10px; }

/* Bestell-Button */
.order-btn { position: absolute; top: 12px; right: 12px; z-index: 4; background: #378ADD; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; }
.order-btn:hover { background: #185FA5; }

/* Thumbnail-Leiste */
.thumb-bar { height: 75px; background: #1a1a1a; border-top: 1px solid #333; display: flex; align-items: center; padding: 6px 8px; overflow-x: auto; overflow-y: hidden; gap: 6px; flex-shrink: 0; scrollbar-width: none; }
.thumb-bar::-webkit-scrollbar { display: none; }
.thumb { width: 56px; height: 56px; flex-shrink: 0; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; position: relative; }
.thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; user-select: none; -webkit-user-select: none; display: block; }
.thumb-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
.thumb.active { border-color: #378ADD; }
.thumb:hover { border-color: #888; }
.thumb-nr { position: absolute; bottom: 2px; left: 0; right: 0; text-align: center; font-size: 9px; color: rgba(255,255,255,0.8); z-index: 3; pointer-events: none; }
</style>

let current = 0;

function showBild(i) {
  current = i;
  document.getElementById('mainImg').src = bilder[i].url;
  document.getElementById('mainTitle').textContent = bilder[i].name;
  document.getElementById('counter').textContent = bilder[i].name + ' / ' + bilder.length;

  // Thumbnails aktualisieren
  document.querySelectorAll('.thumb').forEach((t, idx) => {
    t.classList.toggle('active', idx === i);
  });

  // Aktives Thumbnail in Sicht scrollen
  const bar = document.getElementById('thumbBar');
  const active = bar.querySelectorAll('.thumb')[i];
  if (active) active.scrollIntoView({behavior: 'smooth', block: 'nearest', inline: 'center'});
}

function navigate(dir) {
  let next = current + dir;
  if (next < 0) next = bilder.length - 1;
  if (next >= bilder.length) next = 0;
  showBild(next);
}

function goToShop() {
  const bild = bilder[current].name;
  sessionStorage.setItem('selectedBild', bild);
  sessionStorage.setItem('selectedImg', bilder[current].url);
  window.location.href = 'https://momokkbk.github.io/Jonathan-Gallery/kunstdrucke_v3%203.html';
}

function buildThumbs() {
  const bar = document.getElementById('thumbBar');
  bilder.forEach((b, i) => {
    const t = document.createElement('div');
    t.className = 'thumb' + (i === 0 ? ' active' : '');
    t.innerHTML = `
      <img src="${b.url}" alt="${b.name}" loading="lazy" />
      <div class="thumb-overlay"></div>
      <div class="thumb-nr">${i+1}</div>`;
    t.onclick = () => showBild(i);
    bar.appendChild(t);
  });
}

// Swipe-Geste
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
});

buildThumbs();
showBild(0);
